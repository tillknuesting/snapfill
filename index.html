    <!-- Structured data — WebApplication schema for rich-result eligibility
         and to give LLM/agent crawlers a parseable summary of capabilities. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "PDF Helper — Free PDF Form Filler",
        "alternateName": ["Free PDF Form Filler", "PDF Form Filler", "PDF Form Filler Helper", "PDF Helper"],
        "url": "https://pdf.r3f.co.uk/",
        "description": "Free PDF form filler that runs entirely in your browser. Fill out PDF forms by clicking on form fields and typing, sign with mouse/trackpad/touch, edit existing PDF text, draw freehand, insert dates and photos. 100% free, no sign-up, no upload — PDF files never leave the user's device.",
        "applicationCategory": "ProductivityApplication",
        "applicationSubCategory": "PDF Editor",
        "operatingSystem": "Any (Web)",
        "browserRequirements": "Requires modern browser with WebAssembly and IndexedDB support (Chrome, Firefox, Safari, Edge).",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "isAccessibleForFree": true,
        "inLanguage": ["en", "de", "es", "fr", "zh", "ja", "ar", "hi", "bn", "ru", "pt", "id"],
        "author": {
          "@type": "Person",
          "name": "Till Knüsting"
        },
        "featureList": [
          "Fill PDF form fields by clicking (snap-to-row detection)",
          "Sign PDFs with mouse, trackpad, or touch",
          "Edit existing PDF text in place",
          "Draw freehand annotations with adjustable pen",
          "Insert dates with locale-aware formatting",
          "Add photos and signature images",
          "Acroform widget support (auto-detected text/checkbox fields)",
          "12 UI languages with right-to-left support for Arabic",
          "Multiple themes (light, dark, sepia, high-contrast, solarized, dracula)",
          "Saved profile for one-click autofill of common fields",
          "Saved signatures, reusable across documents",
          "Recent files via IndexedDB (no server upload)",
          "Unicode font fallback for non-Latin scripts",
          "Undo/redo with 50-state history",
          "Built-in form fixtures (IRS 1040/W-4/W-9/Schedule A, USCIS I-9, German Anmeldung/Krankmeldung/Mietvertrag)"
        ],
        "permissions": "No data leaves the device. The application runs entirely in the browser; PDF files are read locally and the output is downloaded directly to the user's machine.",
        "screenshot": "https://pdf.r3f.co.uk/og.png"
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Architects+Daughter&family=Caveat&family=Coming+Soon&family=Homemade+Apple&family=Indie+Flower&family=Just+Another+Hand&family=Kalam&family=Patrick+Hand&family=Reenie+Beanie&family=Shadows+Into+Light&display=swap"
      rel="stylesheet"
    />
    <script>
      // FOUC-prevention: resolve the saved theme and apply its classes to
      // <html> before React mounts. Mirrors src/utils/themes.ts.
      (function () {
        try {
          var t = localStorage.getItem('pdfhelper.theme') || 'system';
          var os = matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved = t === 'system' ? (os ? 'dark' : 'light') : t;
          var meta = {
            light:     { cls: '',                isDark: false },
            dark:      { cls: '',                isDark: true  },
            sepia:     { cls: 'theme-sepia',     isDark: false },
            hc:        { cls: 'theme-hc',        isDark: true  },
            solarized: { cls: 'theme-solarized', isDark: true  },
            dracula:   { cls: 'theme-dracula',   isDark: true  },
          }[resolved];
          if (!meta) return;
          if (meta.cls) document.documentElement.classList.add(meta.cls);
          if (meta.isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
